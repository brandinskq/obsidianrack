<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Infrastructure Investment Model</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0f; --surface:#101018; --raised:#16161f; --line:#1e1e28; --line2:#2a2a36;
    --ink:#f5f6f8; --muted:#8a8a96; --dim:#565662;
    --compute:#c8ff00;         /* Obsidian Rack lime — exact brand accent */
    --compute-dim:#5f7d00;
    --power:#7dd3fc;           /* sky — secondary layer (power/facility) */
    --power-dim:#2e5f7d;
    --pass:#c8ff00; --fail:#ff5c6c; --equity:#c084fc; --neutral:#8a8a96;
    --mono:"SF Mono",ui-monospace,"Cascadia Code",Consolas,"Roboto Mono",monospace;
    --sans:"Inter",-apple-system,system-ui,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;padding:0 20px 28px}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em}

  /* ── deal tape ─────────────────────────────── */
  .tape{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;
    padding:16px 2px 14px;border-bottom:1px solid var(--line)}
  .brandwrap{display:flex;align-items:center;gap:12px}
  .logo{width:30px;height:30px;flex:none}
  .wordmark{font-family:var(--sans);font-weight:800;font-size:16px;letter-spacing:.14em;
    color:var(--ink);line-height:1;display:flex;flex-direction:column;gap:3px}
  .wm-sub{font-family:var(--mono);font-weight:500;font-size:9px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--compute)}
  .tape .statusline{font-family:var(--mono);font-size:11.5px;color:var(--muted);letter-spacing:.02em;
    width:100%;padding-top:10px}
  .tape .statusline b{color:var(--ink);font-weight:600}
  .tape .statusline .cy{color:var(--compute)} .tape .statusline .am{color:var(--power)}
  .tape .brand-legacy{display:none}
  .online-badge{display:inline-flex;align-items:center;gap:6px;margin-left:14px;
    font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.18em;
    color:var(--compute);text-transform:uppercase;padding:4px 9px;
    border:1px solid var(--compute-dim);border-radius:2px}
  .online-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--compute);
    box-shadow:0 0 6px var(--compute);animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .tape .actions{display:flex;gap:8px}
  .btn{border:1px solid var(--line2);background:var(--raised);color:var(--muted);
    border-radius:2px;padding:8px 14px;font-size:11px;font-weight:600;cursor:pointer;
    letter-spacing:.03em;text-transform:uppercase;font-family:var(--mono)}
  .btn:hover{color:var(--ink);border-color:var(--compute)}
  .btn.solid{background:var(--compute);color:#000;border-color:var(--compute);font-weight:700}
  .btn.solid:hover{background:#d4ff45;border-color:#d4ff45}

  /* ── layout ────────────────────────────────── */
  .wrap{display:flex;gap:18px;align-items:flex-start;margin-top:18px;flex-wrap:wrap}
  .rail{width:376px;min-width:320px;flex-shrink:0}
  .main{flex:1;min-width:360px}

  /* ── verdict ───────────────────────────────── */
  .verdict{display:flex;align-items:stretch;gap:0;border:1px solid var(--line);border-radius:3px;
    overflow:hidden;margin-bottom:14px;background:var(--surface)}
  .verdict .word{display:flex;flex-direction:column;justify-content:center;padding:18px 26px;min-width:210px;
    border-right:1px solid var(--line)}
  .verdict .word .w{font-size:27px;font-weight:800;letter-spacing:.04em;font-family:var(--mono)}
  .verdict .word .sub{font-size:11px;color:var(--muted);margin-top:4px}
  .verdict .tests{display:flex;flex:1;flex-wrap:wrap}
  .test{flex:1;min-width:150px;padding:14px 18px;border-right:1px solid var(--line);display:flex;flex-direction:column;gap:4px}
  .test:last-child{border-right:none}
  .test .tl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
  .test .tv{font-family:var(--mono);font-size:16px;font-weight:700}
  .test .tc{font-size:10.5px;color:var(--muted)}

  /* ── KPI grid ──────────────────────────────── */
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(158px,1fr));gap:10px;margin-bottom:14px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:3px;padding:12px 14px}
  .kpi .l{color:var(--dim);font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;margin-bottom:7px}
  .kpi .v{font-family:var(--mono);font-size:21px;font-weight:700;line-height:1.05;letter-spacing:-.02em}
  .kpi .s{color:var(--muted);font-size:10.5px;margin-top:4px}

  /* ── cards & tables ────────────────────────── */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:3px;padding:14px 16px;margin-bottom:14px}
  .card .h{font-size:10.5px;font-weight:700;color:var(--muted);letter-spacing:.16em;text-transform:uppercase;margin-bottom:12px}
  .duo{display:flex;gap:14px;flex-wrap:wrap}
  .duo>.card{flex:1;min-width:300px}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{color:var(--dim);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    padding:0 6px 8px 0;text-align:right}
  th:first-child{text-align:left}
  td{font-family:var(--mono);font-variant-numeric:tabular-nums;padding:6.5px 6px 6.5px 0;
    text-align:right;border-top:1px solid var(--line);color:var(--ink)}
  td:first-child{font-family:var(--sans);text-align:left}
  tr.bold td{font-weight:700}
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:10px;font-size:11px;color:var(--muted)}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:6px;vertical-align:baseline}
  .heat td{font-family:var(--mono);text-align:center;padding:8px 4px;font-weight:700;border:2px solid var(--bg);border-radius:4px;font-size:11.5px}
  .foot{color:var(--dim);font-size:10.5px;margin-top:6px;line-height:1.55}

  /* ── rail controls ─────────────────────────── */
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:3px;padding:14px 16px;margin-bottom:12px}
  .panel .ph{font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .drv{padding:11px 0;border-bottom:1px solid var(--line)}
  .drv:last-child{border-bottom:none;padding-bottom:4px}
  .drv .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;gap:10px}
  .drv label{font-size:13px;font-weight:600}
  .drv .hint{font-size:10px;color:var(--dim);display:block;margin-top:2px;font-weight:400}
  .drv .row label{overflow:visible}
  .drv .row label .ttip{margin-left:5px;vertical-align:middle}
  .val{display:flex;align-items:center;gap:7px;flex-shrink:0}
  input[type=number]{width:100px;text-align:right;background:var(--bg);color:var(--ink);
    font-family:var(--mono);font-weight:600;border:1px solid var(--line2);border-radius:6px;
    padding:5px 8px;font-size:13px;outline:none}
  input[type=number]:focus{border-color:var(--compute)}
  select{background:var(--bg);color:var(--ink);font-family:var(--mono);font-weight:600;
    border:1px solid var(--line2);border-radius:6px;padding:5px 8px;font-size:12.5px;outline:none;cursor:pointer}
  select:focus{border-color:var(--compute)}
  .modeseg{display:flex;gap:0;border:1px solid var(--line2);border-radius:6px;overflow:hidden}
  .modebtn{flex:1;background:var(--bg);color:var(--muted);border:none;padding:6px 10px;font-family:var(--mono);
    font-size:11.5px;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap;text-align:center}
  .rowstack{flex-direction:column;align-items:stretch;gap:7px}
  .rowstack .modeseg{width:100%}
  .rowstack .modebtn{padding:7px 12px}
  .modebtn:first-child{border-right:1px solid var(--line2)}
  .modebtn.on{background:var(--compute);color:#000}
  .flabel{display:inline-flex;align-items:center;gap:5px}
  .ttip{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;
    font-size:9px;color:var(--muted);border:1px solid var(--line2);cursor:help;position:relative;flex:none;font-style:normal}
  .ttip:hover{color:var(--compute);border-color:var(--compute)}
  .ttip:hover::after{content:attr(data-tip);position:absolute;left:50%;bottom:calc(100% + 8px);transform:translateX(-50%);
    width:250px;background:#0a1520;color:#c8d4e0;border:1px solid var(--line2);border-radius:8px;padding:9px 11px;
    font-size:11px;line-height:1.5;font-weight:400;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.5);pointer-events:none;
    letter-spacing:0;text-transform:none;white-space:normal}
  .ttip:hover::before{content:'';position:absolute;left:50%;bottom:calc(100% + 2px);transform:translateX(-50%);
    border:6px solid transparent;border-top-color:var(--line2);z-index:100;pointer-events:none}
  /* rail tooltips: anchor to the icon and open rightward so the left viewport edge never clips them */
  .rail .ttip:hover::after{left:0;right:auto;transform:none;width:min(260px,80vw)}
  .rail .ttip:hover::before{left:6px;right:auto;transform:none}
  .unit{color:var(--dim);font-size:9.5px;width:64px;line-height:1.2}
  input[type=range]{width:100%;accent-color:var(--compute);height:3px}
  .drawer{margin-bottom:10px}
  .drawer>button{width:100%;display:flex;justify-content:space-between;align-items:center;
    background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:10px 14px;
    cursor:pointer;color:var(--ink);font-size:12px;font-weight:600;letter-spacing:.02em}
  .drawer>button:hover{border-color:var(--line2)}
  .drawer .dbody{padding:6px 14px 4px;background:var(--surface);border:1px solid var(--line);
    border-top:none;border-radius:0 0 9px 9px;display:none}
  .drawer.open .dbody{display:block}
  .drawer .mark{color:var(--dim);font-family:var(--mono)}
  .arow{display:flex;justify-content:space-between;align-items:center;padding:5.5px 0}
  .arow>span:first-child{color:var(--muted);font-size:12px}
  .arow input[type=number]{width:88px;font-weight:500;font-size:12.5px}
  .tog{display:flex;justify-content:space-between;align-items:center;padding:7.5px 0;border-bottom:1px solid var(--line)}
  .tog:last-child{border-bottom:none}
  .tog label{font-size:12px;color:var(--ink);font-weight:600}
  .switch{position:relative;width:36px;height:19px;flex-shrink:0}
  .switch input{opacity:0;width:0;height:0}
  .sl{position:absolute;cursor:pointer;inset:0;background:var(--raised);border:1px solid var(--line2);border-radius:19px;transition:.15s}
  .sl:before{content:"";position:absolute;height:11px;width:11px;left:3px;top:3px;background:var(--dim);border-radius:50%;transition:.15s}
  .switch input:checked+.sl{background:rgba(200,255,0,.16);border-color:var(--compute-dim)}
  .switch input:checked+.sl:before{transform:translateX(17px);background:var(--compute)}
  @media (max-width:900px){.rail{width:100%}}
  /* ── mobile / small screens ───────────────── */
  @media (max-width:640px){
    body{padding:0 11px 22px}
    .wrap{gap:12px;margin-top:12px}
    .rail{min-width:0}
    .main{min-width:0}
    .tape{padding:12px 0 12px;gap:12px}
    .wordmark{font-size:15px}
    .online-badge{margin-left:8px}
    .card{padding:12px 12px}
    .grid{grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
    .kpi{padding:11px 12px}
    .kpi .v{font-size:19px}
    .verdict{flex-direction:column}
    .verdict .word{min-width:0;width:100%;border-right:none;border-bottom:1px solid var(--line)}
    .test{min-width:118px}
    .duo>.card{min-width:0}
    .prodcard{min-width:0;flex:1 1 44%}
    /* wide tables scroll horizontally instead of forcing the whole page to overflow */
    .card table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap}
    .card .modet{white-space:normal}
    #modeTable{overflow-x:auto}
  }
  @media (max-width:380px){
    .grid{grid-template-columns:1fr 1fr}
    .prodcard{flex:1 1 100%}
  }
  /* ── product selector ─────────────────────── */
  .prodbar{display:flex;gap:8px;flex-wrap:wrap;padding:16px 2px 6px}
  .prodcard{flex:1;min-width:150px;background:var(--surface);border:1px solid var(--line2);
    border-radius:2px;padding:12px 14px;cursor:pointer;transition:all .14s;text-align:left}
  .prodcard:hover{border-color:var(--compute-dim)}
  .prodcard.on{border-color:var(--compute);background:rgba(200,255,0,.05)}
  .prodcard .pn{font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:3px;letter-spacing:.01em;display:flex;align-items:baseline;gap:7px}
  .prodcard .pnum{font-family:var(--mono);font-size:9.5px;font-weight:600;color:var(--compute);opacity:.75;letter-spacing:.05em}
  .prodcard.on .pn{color:var(--compute)}
  .prodcard.on .pnum{opacity:1}
  .prodcard .ps{font-size:10px;color:var(--dim);line-height:1.4}
  /* ── model selector ───────────────────────── */
  .modelbar{display:flex;gap:6px;flex-wrap:wrap;padding:4px 2px 12px;align-items:center}
  .modelbar .mlabel{font-size:9.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-right:4px;font-family:var(--mono)}
  .modelbtn{background:var(--bg);color:var(--muted);border:1px solid var(--line2);border-radius:2px;
    padding:7px 13px;font-family:var(--mono);font-size:11.5px;font-weight:600;cursor:pointer;transition:all .12s}
  .modelbtn:hover{border-color:var(--compute-dim);color:var(--ink)}
  .modelbtn.on{background:var(--compute);color:#000;border-color:var(--compute)}
  .modelbtn .mp{font-size:9px;opacity:.65;font-weight:400}
  .modelbtn.on .mp{opacity:.8}
  .modelbar.hidden{display:none}
  .modet{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:10.5px;margin-top:2px}
  .modet th{color:var(--dim);font-weight:600;font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;padding:2px 3px;text-align:right}
  .modet th:first-child{text-align:left}
  .modet td{padding:2px 3px;color:var(--muted)}
  .modet input.mi{width:100%;background:var(--bg);color:var(--ink);border:1px solid var(--line2);border-radius:2px;
    padding:4px 5px;font-family:var(--mono);font-size:10.5px;text-align:right;-moz-appearance:textfield}
  .modet input.mi:focus{outline:none;border-color:var(--compute)}
</style>
</head>
<body>

<div class="tape">
  <div class="brandwrap">
    <svg class="logo" width="30" height="30" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Obsidian Rack">
      <polygon points="14,68 8,34 28,4 44,10 64,52 50,68" fill="#16161F" stroke="var(--compute)" stroke-width="1.4"/>
      <line x1="28" y1="4" x2="38" y2="36" stroke="var(--compute)" stroke-width="0.9" opacity="0.7"/>
      <line x1="38" y1="36" x2="64" y2="52" stroke="var(--compute)" stroke-width="0.9" opacity="0.7"/>
      <polygon points="28,4 44,10 38,36" fill="var(--compute)" opacity="0.14"/>
      <line x1="28" y1="4" x2="8" y2="34" stroke="var(--compute)" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
    </svg>
    <div class="wordmark">OBSIDIAN RACK<span class="wm-sub">Investment Model</span></div>
    <span class="online-badge"><span class="dot"></span>MODEL · LIVE</span>
  </div>
  <div class="actions">
    <button class="btn" onclick="preset('saudi')">Saudi power</button>
    <button class="btn solid" onclick="resetAll()">Reset</button>
  </div>
  <div class="statusline" id="tape"></div>
</div>

<div class="prodbar" id="prodbar"></div>
<div class="modelbar" id="modelbar"></div>
<div class="modelbar hidden" id="gradeBar"></div>

<div class="wrap">
  <!-- ───────── rail ───────── -->
  <div class="rail">
    <div class="panel">
      <div class="ph">Core inputs</div>
      <div class="drv">
        <div class="row"><label>GPU capex<span class="hint">per 8-GPU server, bare-metal</span><span class="ttip" data-tip="Bare-metal server price per 8-GPU node (hardware only; networking added separately). HGX B300 OEM systems run ~$430-550k incl. liquid cooling; DGX B300 lists $300-350k. Confirm whether your quote includes networking.">ⓘ</span></label>
          <div class="val"><input type="number" id="serverPrice" step="10000"><span class="unit">$ / server</span></div></div>
        <input type="range" id="serverPrice_r" min="100000" max="1200000" step="10000">
      </div>
      <div class="drv">
        <div class="row"><label>Number of GPUs<span class="hint" id="srvNote">8-GPU HGX B300 nodes</span><span class="ttip" data-tip="Total GPU count, stepped in 1,024 (128 nodes × 8). Internally converted to whole servers. Drives capex, power and MW.">ⓘ</span></label>
          <div class="val"><input type="number" id="gpuCount" step="1024"><span class="unit">GPUs</span></div></div>
        <input type="range" id="gpuCount_r" min="1024" max="40960" step="1024">
      </div>
      <div class="drv">
        <div class="row"><label>Network capex<span class="hint">IB/RoCE fabric · switches, optics, cabling</span><span class="ttip" data-tip="Back-end IB/RoCE fabric — switches, optics, cabling — as % of server capex. ~10-12% for a 4k-GPU two-tier fabric; rises toward 15% at 10k+ as optics counts grow. Set to 0 if your server quote already includes networking.">ⓘ</span></label>
          <div class="val"><input type="number" id="netPct" step="1"><span class="unit">% of server capex</span></div></div>
        <input type="range" id="netPct_r" min="0" max="25" step="1">
      </div>
      <div class="drv">
        <div class="row"><label>GPU Power<span class="hint">HGX B300 node</span><span class="ttip" data-tip="IT power draw per 8-GPU node (GPUs + CPU/mem + in-node NICs). B300 8-GPU ≈ 11.2kW GPUs + 2-3kW CPU/mem/NIC = ~14kW. The external network fabric is the separate 'Network Power' field below. Together they drive electricity and facility MW sizing.">ⓘ</span></label>
          <div class="val"><input type="number" id="powerKW" step="0.5"><span class="unit">kW</span></div></div>
        <input type="range" id="powerKW_r" min="8" max="25" step="0.5">
      </div>
      <div class="drv">
        <div class="row"><label>Network Power<span class="hint">IB/Spectrum fabric · switches + optics</span><span class="ttip" data-tip="External network fabric power per node — leaf/spine InfiniBand/Spectrum switches + optics, outside the 8-GPU node. ≈10% of GPU power for rail-optimized 800G clusters. Added on top of GPU Power for electricity and facility MW sizing.">ⓘ</span></label>
          <div class="val"><input type="number" id="netPowerKW" step="0.1"><span class="unit">kW</span></div></div>
        <input type="range" id="netPowerKW_r" min="0" max="5" step="0.1">
      </div>
      <div class="drv">
        <div class="row"><label>Electricity price<span class="hint">grid tariff</span><span class="ttip" data-tip="Grid electricity tariff. Saudi industrial power ≈ $0.047/kWh — among the cheapest globally, a core structural advantage. Multiplied by PUE.">ⓘ</span></label>
          <div class="val"><input type="number" id="elec" step="0.001"><span class="unit">$ / kWh</span></div></div>
        <input type="range" id="elec_r" min="0.02" max="0.20" step="0.001">
      </div>
      <div class="drv" id="rentalRow">
        <div class="row"><label>GPU rental price<span class="hint" id="rentNote">blended start price</span><span class="ttip" data-tip="Effective GPU-hour price, blended from the model's wholesale and on-demand rates by the wholesale sales share below. Wholesale = spot/contract floor; on-demand = lowest of AWS/Azure/OCI retail. Edit directly to override the blend.">ⓘ</span></label>
          <div class="val"><input type="number" id="rental" step="0.10"><span class="unit">$ / GPU-hr</span></div></div>
        <input type="range" id="rental_r" min="0.5" max="20" step="0.1">
        <div class="row" style="margin-top:9px"><label>Wholesale sales share<span class="hint" id="wsNote">65% contract · 35% on-demand</span><span class="ttip" data-tip="Share of fleet capacity sold on wholesale/committed contracts vs on-demand retail. Contract revenue is bankable (services debt); on-demand earns a premium but is volatile. rental = share×wholesale + (1−share)×on-demand.">ⓘ</span></label>
          <div class="val"><input type="number" id="wsShare" step="5"><span class="unit">% wholesale</span></div></div>
        <input type="range" id="wsShare_r" min="0" max="100" step="5">
      </div>
      <div class="drv" id="custRow">
        <div class="row rowstack"><label>Customer type<span class="hint" id="vatNote">domestic · +15% VAT</span><span class="ttip" data-tip="VAT treatment of the quote. Domestic KSA sale → 15% VAT on the invoice. Qualifying export of services to a non-resident (e.g. a Dubai/UAE company consuming compute abroad) → 0% zero-rated. VAT is a pass-through: it does NOT change revenue, EBITDA or IRR — it only sets the customer-facing invoice price. Export zero-rating is subject to ZATCA confirmation and applies to a genuine service, not a lease of specific KSA-located hardware.">ⓘ</span></label>
          <div class="modeseg"><button id="cust_domestic" class="modebtn" onclick="setCustomer('domestic')">Domestic · 15% VAT</button><button id="cust_export" class="modebtn" onclick="setCustomer('export')">Export · 0% VAT</button></div>

function modeRevPerHr(m){ // one modality's revenue per GPU-hour, in its native billing unit

/* ═══════════════ engine (validated) ═══════════════ */
function irr(cf){
  const npv=r=>cf.reduce((s,c,i)=>s+c/Math.pow(1+r,i),0);
  // cap the monthly-rate search at 100%/mo — anything above annualizes to economically
  // meaningless (>400,000%) and is invariably a multiple-IRR / degenerate-cashflow artifact
  let lo=-0.9999,hi=1;
  if(npv(lo)*npv(hi)>0) return null;
  let m=(lo+hi)/2;
  for(let k=0;k<220;k++){m=(lo+hi)/2;const v=npv(m); if(Math.abs(v)<1e-4)break; if(npv(lo)*v<0)hi=m; else lo=m;}
  return m>=1-1e-4?null:m; // root pinned at the ceiling ⇒ no meaningful IRR
}
function compute(p,tog){
  const H=730, N=Math.round(p.years*12), gpus=p.gpus;
  const taxRate=(p.saudiPct!=null)?(p.saudiPct*0.025+(1-p.saudiPct)*0.20):p.tax; // Zakat 2.5% (Saudi/GCC) blended with 20% CIT (foreign)
  const useGpu0=tog._gpu!==false;
  // For PropCo-only products (Data Hall / Colo), the "build unit" is colo MW, not GPU servers.
  const target=useGpu0?p.servers:Math.max(1,Math.round(p.coloMW));
  const useDebt=tog.debt, useDecline=tog.decline, useUtil=tog.util, usePhase=tog.phase;
  const deployM=usePhase?Math.max(1,p.deployMonths):1;
  const decline=useDecline?p.rentalDecline:0;
  const uStart=useUtil?p.utilStart:p.utilSteady, uRamp=useUtil?Math.max(1,p.utilRamp):1;
  const debtPct=useDebt?p.debtPct:0;
  const lockM=tog.lock?Math.max(0,Math.round((p.lockYears||0)*12)):0;
  const useFac=tog.facility;
  const useGA=tog.ga;
  const useWC=tog.wc, useExit=tog.exit;
  const useColo=tog.colo&&useFac;
  const useGpu=tog._gpu!==false;   // false for Data Hall / Colo products (PropCo only)
  const useTaas=tog._taas===true;  // Token-as-a-Service: revenue = tokens sold × price, not GPU-hr rental
  // TaaS blends the Text/Audio/Image/Video modality mix into one effective $/GPU-hr; cost stays the shared fleet
  const baseRental=useTaas?taasBlended(p).rental:p.rental; // blended effective $/GPU-hr
  const occ=useGpu?1:(p.occupancy!=null?p.occupancy:1); // PropCo lease-up / occupancy
  const pkEff=p.powerKW+(p.netPowerKW||0); // effective IT power/node = GPU power + external network fabric (switches + optics)
  const gpuMW=useGpu?target*pkEff/1000:0;
  const coloMW=useGpu?(useColo?p.coloMW:0):p.coloMW;  // GPU-off: colo is the whole facility
  const mwIT=gpuMW+coloMW;
  const facTotal=useFac?mwIT*p.facilityPerMW:0;
  const facPerServer=(useFac&&useGpu)?facTotal*(gpuMW/Math.max(mwIT,1e-9))/Math.max(1,target):0;

  const lead=usePhase?Math.max(0,Math.round(p.leadMonths||0)):0;

  } else {

function modalitySplit(){ // TaaS: capacity-mix vs revenue-share bars + legend

const TIER_CC={ws:'#7dd3fc', od:'#c8ff00'}; // wholesale=sky, on-demand=lime

  const Yp=v=>H-pad-(v/pmax)*(H-2*pad);
  const line=(key,Y,st,wd)=>{let d='M'+X(mo[0].m).toFixed(1)+' '+Y(mo[0][key]).toFixed(1);

  area+=` L${X(mo[N-1].m).toFixed(1)} ${H-pad} L${X(mo[0].m).toFixed(1)} ${H-pad} Z`;
  let ticks=''; const yrN=Math.round(N/12);
  for(let y=0;y<=yrN;y++){const m=y*12<1?1:y*12; if(m<=N)ticks+=`<text x="${X(m).toFixed(1)}" y="${H-13}" fill="#5c6875" font-size="10" font-family="ui-monospace,monospace" text-anchor="middle">Y${y}</text>`;}
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}">
    <path d="${area}" fill="rgba(125,211,252,.10)" stroke="none"/>
    ${line('rev',Yr,'#c8ff00')}
    ${line('ebitda',Yr,'#7dd3fc')}
    ${line('price',Yp,'#ff5c6c',1.6)}
    ${ticks}
    <text x="${W-4}" y="14" fill="#ff5c6c" font-size="10" font-family="ui-monospace,monospace" text-anchor="end">price →</text>
  </svg>`;
}
function paybackChart(mo,years){
  const W=640,H=190,pad=36;
  const arr=[{m:0,cum:0}].concat(mo.map(d=>({m:d.m,cum:d.cumEq})));
  const xmax=Math.max(...arr.map(p=>p.m)), ymin=Math.min(...arr.map(p=>p.cum),0), ymax=Math.max(...arr.map(p=>p.cum),0);
  const X=m=>pad+(m/xmax)*(W-pad-12), Y=v=>H-pad-((v-ymin)/((ymax-ymin)||1))*(H-2*pad);
  let d='M'+arr.map(p=>X(p.m).toFixed(1)+' '+Y(p.cum).toFixed(1)).join(' L ');
  const cross=arr.find(p=>p.cum>=0&&p.m>0);
  let dot=cross?`<circle cx="${X(cross.m).toFixed(1)}" cy="${Y(0).toFixed(1)}" r="4" fill="#c8ff00"/><text x="${X(cross.m).toFixed(1)}" y="${(Y(0)-10).toFixed(1)}" fill="#c8ff00" font-size="10.5" font-family="ui-monospace,monospace" text-anchor="middle">${(cross.m/12).toFixed(1)}y</text>`:'';
  let ticks=''; for(let y=0;y<=years;y++){const m=y*12;if(m<=xmax)ticks+=`<text x="${X(m).toFixed(1)}" y="${H-13}" fill="#5c6875" font-size="10" font-family="ui-monospace,monospace" text-anchor="middle">Y${y}</text>`;}
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}">
    <line x1="${pad}" y1="${Y(0).toFixed(1)}" x2="${W-12}" y2="${Y(0).toFixed(1)}" stroke="#262d37"/>
    <path d="${d}" fill="none" stroke="#c8ff00" stroke-width="2.2"/>${dot}${ticks}
    <text x="${pad-6}" y="${(Y(ymax)+4).toFixed(1)}" fill="#5c6875" font-size="10" font-family="ui-monospace,monospace" text-anchor="end">${money(ymax)}</text>
    <text x="${pad-6}" y="${(Y(ymin)+4).toFixed(1)}" fill="#5c6875" font-size="10" font-family="ui-monospace,monospace" text-anchor="end">${money(ymin)}</text>
  </svg>`;
}
function dscrChart(yrs){
  const W=640,H=180,pad=32,n=yrs.length;
  const vals=yrs.map(y=>y.dscr||0), max=Math.max(...vals,1.6);
  const gap=(W-pad-12)/n, bw=gap*0.5;
  const Y=v=>H-pad-(v/max)*(H-2*pad);
  let bars=''; yrs.forEach((y,i)=>{const v=y.dscr; const x=pad+i*gap+gap*0.25;
    const col=v==null?'#2e3742':v<1.2?'#ff5c6c':'#c8ff00';
    const h=v==null?0:(v/max)*(H-2*pad);
    bars+=`<rect x="${x.toFixed(1)}" y="${(H-pad-h).toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" fill="${col}" rx="3"/>
      <text x="${(x+bw/2).toFixed(1)}" y="${(H-pad-h-6).toFixed(1)}" fill="#e9edf2" font-size="10.5" font-family="ui-monospace,monospace" text-anchor="middle">${v==null?'n/a':v.toFixed(2)+'x'}</text>
      <text x="${(x+bw/2).toFixed(1)}" y="${H-12}" fill="#5c6875" font-size="10" font-family="ui-monospace,monospace" text-anchor="middle">Y${y.y}</text>`;});
  const cov=Y(1.2);
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}">
    <line x1="${pad}" y1="${cov.toFixed(1)}" x2="${W-12}" y2="${cov.toFixed(1)}" stroke="#ff5c6c" stroke-dasharray="4 3" opacity=".7"/>
    <text x="${W-10}" y="${(cov-5).toFixed(1)}" fill="#ff5c6c" font-size="9.5" font-family="ui-monospace,monospace" text-anchor="end">1.20x</text>${bars}</svg>`;
}

/* ═══════════════ sensitivity & scenarios ═══════════════ */
function heatColor(v,lo,hi){
  if(v==null)return '#2e3742';
  const t=Math.max(0,Math.min(1,(v-lo)/((hi-lo)||1)));
  const r=Math.round(242+(88-242)*t), g=Math.round(112+(214-112)*t), b=Math.round(138+(141-138)*t);
  return `rgb(${r},${g},${b})`;
}
function sensitivity(){
  const mults=[0.6,0.8,1.0,1.2,1.4], cols=[0.6,0.7,0.8,0.9,0.95];
  const levered=T.debt, propco=T._gpu===false, taas=T._taas===true;
  // axes by product: TaaS = token price $/1M × utilization; PropCo/IDC = lease $/kW·mo × occupancy; GPU = rental $/GPU-hr × utilization
  const base=taas?taasBlended(S).rental:propco?S.coloRate:S.rental;
  const grid=mults.map(rm=>cols.map(u=>{
    const o=taas
      ? compute({...S, modes:S.modes.map(m=>({...m,outPrice:m.outPrice*rm,inPrice:(m.inPrice||0)*rm})), utilSteady:u}, T)
      : propco
      ? compute({...S, coloRate:S.coloRate*rm, occupancy:u}, T)
      : compute({...S, rental:S.rental*rm, utilSteady:u}, T);
    return levered?o.eIRR:o.pIRR;
  }));
  const flat=grid.flat().filter(v=>v!=null);
  const lo=Math.min(...flat), hi=Math.max(...flat);
  let html=`<table class="heat"><thead><tr><th>${levered?'Equity':'Project'} IRR</th>`+
    cols.map(u=>`<th style="text-align:center">${(u*100).toFixed(0)}%</th>`).join('')+`</tr></thead><tbody>`;
  mults.forEach((rm,i)=>{
    const rowLabel=propco?`$${(base*rm).toFixed(0)}`:`$${(base*rm).toFixed(2)}`;
    html+=`<tr><td class="num" style="color:var(--muted)">${rowLabel}</td>`+
      grid[i].map(v=>`<td style="background:${heatColor(v,lo,hi)};color:#0f1216">${v==null?'n/a':(v*100).toFixed(0)+'%'}</td>`).join('')+`</tr>`;
  });
  const foot=taas?'rows: blended sell price $/GPU-hr · columns: steady utilization'
    :propco?'rows: IDC lease $/kW·mo · columns: occupancy':'rows: rental $/GPU-hr · columns: steady utilization';
  return html+`</tbody></table><div class="foot">${foot} · each cell reruns the full engine</div>`;
}
function scenarios(){
  const defs={
    Bear:{rentalMult:0.8, utilSteady:Math.max(0.4,S.utilSteady-0.15), declineAdd:0.10, elecMult:1.2, residAdd:-0.10},
    Base:{rentalMult:1.0, utilSteady:S.utilSteady, declineAdd:0, elecMult:1.0, residAdd:0},
    Bull:{rentalMult:1.2, utilSteady:Math.min(0.95,S.utilSteady+0.08), declineAdd:-0.08, elecMult:0.9, residAdd:0.15},
  };
  const res={};
  for(const k in defs){const d=defs[k];
    res[k]=compute({...S, rental:S.rental*d.rentalMult, utilSteady:d.utilSteady,
      rentalDecline:Math.max(0,S.rentalDecline+d.declineAdd), elec:S.elec*d.elecMult,
      residualPct:Math.max(0,Math.min(0.5,S.residualPct+d.residAdd))}, T);}
  const rows=[
    ['Project IRR',k=>irrf(res[k].pIRR)],
    [T.debt?'Equity IRR':'Equity IRR (debt off)',k=>T.debt?irrf(res[k].eIRR):'—'],
    ['Equity MOIC',k=>res[k].moic==null?'n/a':res[k].moic.toFixed(2)+'x'],
    ['Payback',k=>yrf(res[k].paybackYears)],
    ['Avg EBITDA margin',k=>pctf(res[k].avgEbMargin)],
    ['Min DSCR',k=>res[k].minDSCR==null?'n/a':res[k].minDSCR.toFixed(2)+'x'],
    ['Project NPV @ hurdle',k=>money(res[k].projNPV)],
  ];
  const cols=['Bear','Base','Bull'], colcol={Bear:'var(--fail)',Base:'var(--power)',Bull:'var(--pass)'};
  let html=`<table><thead><tr><th>Metric</th>`+
    cols.map(c=>`<th style="color:${colcol[c]}">${c}</th>`).join('')+`</tr></thead><tbody>`;
  rows.forEach(([lb,fn])=>{html+=`<tr><td>${lb}</td>`+cols.map(c=>`<td>${fn(c)}</td>`).join('')+`</tr>`;});
  return html+`</tbody></table><div class="foot">Bear: −20% price, −15pt util, +10pt erosion, +20% power, −10pt residual · Bull: +20% price, +8pt util, −8pt erosion, −10% power, +15pt residual (H100-style scarcity playbook)</div>`;
}

/* ═══════════════ verdict ═══════════════ */
function verdict(o){
  const unitPass=o.margin>0;
  const debtPass=!T.debt || o.minDSCR==null || o.minDSCR>=1.2;
  const retIRR=T.debt?o.eIRR:o.pIRR;
  const retPass=retIRR!=null && retIRR>=S.disc;
  const fails=(unitPass?0:1)+(debtPass?0:1)+(retPass?0:1);
  const word=fails===0?['BANKABLE','var(--pass)','all three tests pass']:
              fails===1?['MARGINAL','var(--power)','one test failing']:
                        ['UNDERWATER','var(--fail)','two or more tests failing'];
  const chip=(pass,label,val,ctx)=>`<div class="test">
    <div class="tl">${label}</div>
    <div class="tv" style="color:${pass?'var(--pass)':'var(--fail)'}">${val}</div>
    <div class="tc">${ctx}</div></div>`;
  return `<div class="verdict">
    <div class="word"><div class="w" style="color:${word[1]}">${word[0]}</div><div class="sub">${word[2]}</div></div>
    <div class="tests">
      ${chip(unitPass,'Unit margin',dol(o.margin)+o.unitStr,`price ${dol(o.unitPrice)} vs cost ${dol(o.costBasis)}`)}
      ${chip(debtPass,'Debt cover',T.debt?(o.minDSCR==null?'n/a':o.minDSCR.toFixed(2)+'x'):'no debt',T.debt?'min DSCR vs 1.20x covenant':'all-equity structure')}
      ${chip(retPass,'Return vs hurdle',irrf(retIRR),`${T.debt?'equity':'project'} IRR vs ${(S.disc*100).toFixed(0)}% hurdle`)}
    </div></div>`;
}

function buildGroup(id,fields){
  const b=document.getElementById(id);

  b.innerHTML=fields.map(f=>{
    if(f.options){
      return `<div class="arow" id="wrap_${f.k}">${lbl(f)}
        <span class="val"><select id="a_${f.k}">${f.options.map(v=>`<option value="${v}"${v===S[f.k]?' selected':''}>${v} · ${(v*S.gpus).toLocaleString()} GPU</option>`).join('')}</select><span class="unit">${f.unit}</span></span></div>`;

  if(gc){gc.value=S.servers*S.gpus;} if(gcr){gcr.value=S.servers*S.gpus;}

  if(cp){cp.value=S.coloPerKWMo;} if(cpr){cpr.value=S.coloPerKWMo;}
  const lr=document.getElementById('coloRate'),lrr=document.getElementById('coloRate_r');
  if(lr){lr.value=S.coloRate;} if(lrr){lrr.value=S.coloRate;}
  const oc=document.getElementById('occupancy'),ocr=document.getElementById('occupancy_r');
  if(oc){oc.value=Math.round(S.occupancy*100);} if(ocr){ocr.value=Math.round(S.occupancy*100);}
  buildGroup('body_rev',F_REV);buildGroup('body_cost',F_COST);buildGroup('body_fin',F_FIN);
}
